<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IS Haifa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
        }

        .navbar {
            background-color: #343a40;
        }

        .navbar .nav-link {
            color: #fff !important;
            font-weight: 500;
        }

        .navbar .nav-link:hover {
            color: #ffc107 !important;
        }

        .hero {
            background: linear-gradient(to right, #6c757d, #343a40);
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            border-radius: 12px 12px 0 0;
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        footer {
            background-color: #343a40;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }

        footer a {
            color: #ffc107;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">IS Haifa, 14867 Entries.</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#about">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#resources">Resources</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section style="background: linear-gradient(90deg, #dc3545, #ff4d4d); padding: 40px 20px; text-align: center; direction: rtl;">
    <div class="container">
        <h1 style="font-size: 42px; font-weight: 900; color: white; margin-bottom: 20px;">
            שימו לב - האתר מוזג לתוך 
            <a href="https://cs-haifa.com" style="color: #ffc107; text-decoration: underline;">
                https://cs-haifa.com
            </a>
        </h1>
        <h2 style="font-size: 32px; font-weight: 700; color: #ffffff;">
            הירשמו עכשיו!
        </h2>
        <a href="https://cs-haifa.com" class="btn btn-warning btn-lg mt-3" style="font-weight: 700;">
            מעבר לאתר החדש
        </a>
    </div>
</section>

</body>
</html>
